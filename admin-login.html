<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutomateX Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-white">
  <main class="flex min-h-screen items-center justify-center px-4 py-10">
    <section class="w-full max-w-md rounded-3xl border border-slate-800 bg-slate-900/80 p-8 shadow-2xl shadow-slate-950/40 backdrop-blur">
      <div class="mb-8">
        <p class="text-sm uppercase tracking-[0.28em] text-cyan-400">AutomateX</p>
        <h1 class="mt-3 text-3xl font-semibold">Admin Login</h1>
        <p class="mt-2 text-sm text-slate-400">Sign in with your owner account to access the SaaS control center.</p>
      </div>

      <form id="adminLoginForm" class="space-y-4">
        <label class="block">
          <span class="mb-2 block text-sm text-slate-300">Email</span>
          <input
            id="email"
            type="email"
            required
            class="w-full rounded-2xl border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-white outline-none transition focus:border-cyan-400"
            placeholder="admin@automatex.com"
          >
        </label>

        <label class="block">
          <span class="mb-2 block text-sm text-slate-300">Password</span>
          <input
            id="password"
            type="password"
            required
            class="w-full rounded-2xl border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-white outline-none transition focus:border-cyan-400"
            placeholder="Enter your password"
          >
        </label>

        <button
          id="submitButton"
          type="submit"
          class="w-full rounded-2xl bg-cyan-400 px-4 py-3 text-sm font-semibold text-slate-950 transition hover:bg-cyan-300"
        >
          Sign In
        </button>
      </form>

      <p id="feedback" class="mt-4 hidden rounded-2xl border border-rose-500/40 bg-rose-500/10 px-4 py-3 text-sm text-rose-200"></p>
    </section>
  </main>

  <script>
    const TOKEN_KEY = "automatex_admin_token";
    const USER_KEY = "automatex_admin_user";
    const feedback = document.getElementById("feedback");
    const submitButton = document.getElementById("submitButton");

    function showError(message) {
      feedback.textContent = message;
      feedback.classList.remove("hidden");
    }

    async function verifyExistingAdminSession() {
      const token = localStorage.getItem(TOKEN_KEY);
      if (!token) {
        return;
      }

      try {
        const response = await fetch("/api/auth/me", {
          headers: {
            Authorization: `Bearer ${token}`
          }
        });

        if (!response.ok) {
          throw new Error("Session invalid");
        }

        const payload = await response.json();
        if (!payload.user || payload.user.role !== "admin") {
          throw new Error("Admin access required");
        }

        localStorage.setItem(USER_KEY, JSON.stringify(payload.user));
        window.location.href = "/admin.html";
      } catch (_error) {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(USER_KEY);
      }
    }

    document.getElementById("adminLoginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      feedback.classList.add("hidden");
      submitButton.disabled = true;
      submitButton.textContent = "Signing In...";

      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value
          })
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.message || "Unable to sign in.");
        }

        if (!payload.user || payload.user.role !== "admin") {
          throw new Error("This account does not have admin access.");
        }

        localStorage.setItem(TOKEN_KEY, payload.token);
        localStorage.setItem(USER_KEY, JSON.stringify(payload.user));
        window.location.href = "/admin.html";
      } catch (error) {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(USER_KEY);
        showError(error.message || "Unable to sign in.");
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "Sign In";
      }
    });

    verifyExistingAdminSession();
  </script>
</body>
</html>
