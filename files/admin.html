<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutomateX Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0d12;
      --surface:   #12151d;
      --border:    #1e2230;
      --accent:    #4fd1c5;
      --accent2:   #f5b944;
      --accent3:   #ff6b3d;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --success:   #34d399;
      --warning:   #f59e0b;
      --danger:    #ef4444;
      --mono:      'DM Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* ── Login overlay ── */
    #loginOverlay {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 360px;
      text-align: center;
    }
    .login-box h1 { font-size: 1.5rem; margin-bottom: 6px; }
    .login-box p  { color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; font-family: var(--mono); }
    .login-box input {
      width: 100%; padding: 12px 16px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 1rem;
      margin-bottom: 14px; outline: none; font-family: var(--mono);
      transition: border-color .2s;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box button {
      width: 100%; padding: 13px;
      background: var(--accent); border: none; border-radius: 8px;
      color: #0b0d12; font-weight: 700; font-size: 1rem;
      cursor: pointer; font-family: var(--sans);
      transition: opacity .2s;
    }
    .login-box button:hover { opacity: .85; }
    #loginError { color: var(--danger); font-size: .8rem; margin-top: 10px; font-family: var(--mono); }

    /* ── Layout ── */
    .admin-wrap { display: none; flex-direction: column; min-height: 100vh; }
    .admin-wrap.visible { display: flex; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo { font-size: 1.2rem; font-weight: 800; letter-spacing: -.5px; }
    .logo span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; }
    .btn-logout {
      padding: 7px 16px; border-radius: 6px;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; font-size: .8rem;
      font-family: var(--sans); transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Nav tabs ── */
    nav { display: flex; gap: 4px; padding: 20px 32px 0; border-bottom: 1px solid var(--border); background: var(--surface); }
    .tab {
      padding: 10px 20px; border-radius: 8px 8px 0 0;
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; font-family: var(--sans); font-size: .9rem;
      border-bottom: 2px solid transparent; transition: all .2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .tab-badge {
      display: inline-block; background: var(--accent3); color: #fff;
      border-radius: 10px; padding: 1px 7px; font-size: .72rem;
      margin-left: 6px; font-weight: 700;
    }

    /* ── Main content ── */
    main { flex: 1; padding: 32px; max-width: 1200px; width: 100%; margin: 0 auto; }

    /* ── Stats row ── */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 24px;
    }
    .stat-label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-family: var(--mono); }
    .stat-value { font-size: 2rem; font-weight: 800; margin-top: 4px; }
    .stat-value.teal { color: var(--accent); }
    .stat-value.amber { color: var(--accent2); }
    .stat-value.orange { color: var(--accent3); }
    .stat-value.green { color: var(--success); }

    /* ── Section ── */
    .section { display: none; }
    .section.active { display: block; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-size: 1.1rem; font-weight: 700; }

    .filter-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; font-size: .8rem;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; font-family: var(--sans);
      transition: all .2s;
    }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); color: #0b0d12; border-color: var(--accent); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th {
      background: var(--surface); padding: 12px 16px; text-align: left;
      font-size: .72rem; text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); border-bottom: 1px solid var(--border);
      font-family: var(--mono);
    }
    td { padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(79, 209, 197, 0.03); }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: .72rem; font-weight: 600; font-family: var(--mono);
    }
    .badge-confirmed { background: rgba(52,211,153,.15); color: var(--success); }
    .badge-pending   { background: rgba(245,158,11,.15); color: var(--warning); }
    .badge-cancelled { background: rgba(239,68,68,.15);  color: var(--danger); }
    .badge-new       { background: rgba(79,209,197,.15); color: var(--accent); }
    .badge-read      { background: rgba(107,114,128,.15); color: var(--muted); }
    .badge-published { background: rgba(52,211,153,.15); color: var(--success); }

    .action-btn {
      padding: 5px 12px; border-radius: 6px; font-size: .76rem;
      border: 1px solid var(--border); background: transparent;
      color: var(--text); cursor: pointer; font-family: var(--sans);
      transition: all .2s; margin-right: 4px;
    }
    .action-btn:hover { background: var(--surface); }
    .action-btn.approve { border-color: var(--success); color: var(--success); }
    .action-btn.approve:hover { background: rgba(52,211,153,.1); }
    .action-btn.reject  { border-color: var(--danger); color: var(--danger); }
    .action-btn.reject:hover { background: rgba(239,68,68,.1); }
    .action-btn.publish { border-color: var(--accent); color: var(--accent); }
    .action-btn.publish:hover { background: rgba(79,209,197,.1); }

    .loading { text-align: center; padding: 48px; color: var(--muted); font-family: var(--mono); }
    .empty { text-align: center; padding: 48px; color: var(--muted); }

    /* ── Stars ── */
    .stars { color: var(--accent2); letter-spacing: 1px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: 10px; padding: 14px 20px;
      font-size: .875rem; font-family: var(--mono);
      transform: translateY(80px); opacity: 0;
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
      max-width: 320px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    /* ── Search ── */
    .search-input {
      padding: 8px 14px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: .85rem;
      outline: none; font-family: var(--mono); width: 220px;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--accent); }
  </style>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay">
  <div class="login-box">
    <h1>AutomateX <span style="color:var(--accent)">Admin</span></h1>
    <p>// secure dashboard access</p>
    <input type="text"     id="loginUser" placeholder="Username" autocomplete="off" />
    <input type="password" id="loginPass" placeholder="Password" />
    <button id="loginBtn">Sign In</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- Admin App -->
<div class="admin-wrap" id="adminWrap">
  <header>
    <div class="logo">Automate<span>X</span> <span style="color:var(--muted);font-size:.8rem;font-weight:400">/ admin</span></div>
    <div class="header-right">
      <span class="status-dot"></span>
      <span style="font-size:.8rem;color:var(--muted);font-family:var(--mono)" id="dbStatus">connected</span>
      <button class="btn-logout" id="logoutBtn">Sign out</button>
    </div>
  </header>

  <nav>
    <button class="tab active" data-tab="bookings">Bookings <span class="tab-badge" id="badge-bookings">0</span></button>
    <button class="tab"        data-tab="inquiries">Inquiries <span class="tab-badge" id="badge-inquiries">0</span></button>
    <button class="tab"        data-tab="reviews">Reviews <span class="tab-badge" id="badge-reviews">0</span></button>
  </nav>

  <main>
    <!-- Stats -->
    <div class="stats" id="statsRow">
      <div class="stat-card"><div class="stat-label">Total Bookings</div><div class="stat-value teal" id="s-bookings">–</div></div>
      <div class="stat-card"><div class="stat-label">Confirmed</div><div class="stat-value green" id="s-confirmed">–</div></div>
      <div class="stat-card"><div class="stat-label">Inquiries</div><div class="stat-value amber" id="s-inquiries">–</div></div>
      <div class="stat-card"><div class="stat-label">Reviews</div><div class="stat-value orange" id="s-reviews">–</div></div>
    </div>

    <!-- Bookings -->
    <div class="section active" id="tab-bookings">
      <div class="section-header">
        <div class="section-title">Bookings</div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <input class="search-input" id="searchBookings" placeholder="Search name or email…" />
          <div class="filter-row">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="confirmed">Confirmed</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="cancelled">Cancelled</button>
          </div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th><th>Email</th><th>Phone</th><th>Service</th>
              <th>Date</th><th>Time</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="bookingsBody"><tr><td colspan="8" class="loading">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Inquiries -->
    <div class="section" id="tab-inquiries">
      <div class="section-header">
        <div class="section-title">Inquiries</div>
        <input class="search-input" id="searchInquiries" placeholder="Search name or email…" />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Name</th><th>Email</th><th>Message</th><th>Status</th><th>Date</th><th>Actions</th></tr>
          </thead>
          <tbody id="inquiriesBody"><tr><td colspan="6" class="loading">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Reviews -->
    <div class="section" id="tab-reviews">
      <div class="section-header">
        <div class="section-title">Reviews</div>
        <input class="search-input" id="searchReviews" placeholder="Search name…" />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Name</th><th>Role</th><th>Review</th><th>Rating</th><th>Status</th><th>Date</th><th>Actions</th></tr>
          </thead>
          <tbody id="reviewsBody"><tr><td colspan="7" class="loading">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
const API = '/api/admin';
let token = sessionStorage.getItem('ax_admin_token') || '';
let allData = { bookings: [], inquiries: [], reviews: [] };

// ── Login ──
async function tryLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const err  = document.getElementById('loginError');
  err.textContent = '';

  try {
    const res  = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.message || 'Invalid credentials.'; return; }
    token = data.token;
    sessionStorage.setItem('ax_admin_token', token);
    showAdmin();
  } catch {
    err.textContent = 'Cannot reach server.';
  }
}

document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('ax_admin_token');
  token = '';
  document.getElementById('adminWrap').classList.remove('visible');
  document.getElementById('loginOverlay').style.display = 'flex';
});

function showAdmin() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('adminWrap').classList.add('visible');
  loadAll();
}

if (token) showAdmin();

// ── Auth fetch ──
async function authFetch(url, opts = {}) {
  const res = await fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) }
  });
  if (res.status === 401) { sessionStorage.removeItem('ax_admin_token'); location.reload(); }
  return res;
}

// ── Toast ──
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3200);
}

// ── Tabs ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ── Load all ──
async function loadAll() {
  await Promise.all([loadBookings(), loadInquiries(), loadReviews()]);
  updateStats();
}

// ── Booking filter ──
let bookingFilter = 'all';
let bookingSearch = '';

document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    bookingFilter = btn.dataset.filter;
    renderBookings();
  });
});
document.getElementById('searchBookings').addEventListener('input', e => {
  bookingSearch = e.target.value.toLowerCase();
  renderBookings();
});
document.getElementById('searchInquiries').addEventListener('input', e => {
  renderInquiries(e.target.value.toLowerCase());
});
document.getElementById('searchReviews').addEventListener('input', e => {
  renderReviews(e.target.value.toLowerCase());
});

// ── Bookings ──
async function loadBookings() {
  try {
    const res  = await authFetch(`${API}/bookings`);
    const data = await res.json();
    allData.bookings = data.bookings || [];
    renderBookings();
    document.getElementById('badge-bookings').textContent = allData.bookings.length;
  } catch { document.getElementById('bookingsBody').innerHTML = '<tr><td colspan="8" class="empty">Failed to load.</td></tr>'; }
}

function renderBookings() {
  const tbody = document.getElementById('bookingsBody');
  let rows = allData.bookings;
  if (bookingFilter !== 'all') rows = rows.filter(b => b.status === bookingFilter);
  if (bookingSearch) rows = rows.filter(b =>
    b.name.toLowerCase().includes(bookingSearch) || b.email.toLowerCase().includes(bookingSearch)
  );

  if (!rows.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">No bookings found.</td></tr>'; return; }

  tbody.innerHTML = rows.map(b => `
    <tr>
      <td><strong>${esc(b.name)}</strong></td>
      <td style="font-family:var(--mono);font-size:.8rem">${esc(b.email)}</td>
      <td style="font-family:var(--mono);font-size:.8rem">${esc(b.phone || '—')}</td>
      <td>${esc(b.service || '—')}</td>
      <td style="font-family:var(--mono)">${b.date}</td>
      <td style="font-family:var(--mono)">${b.time}</td>
      <td><span class="badge badge-${b.status}">${b.status}</span></td>
      <td>
        ${b.status !== 'confirmed' ? `<button class="action-btn approve" onclick="updateBooking('${b._id}','confirmed')">Approve</button>` : ''}
        ${b.status !== 'cancelled' ? `<button class="action-btn reject"  onclick="updateBooking('${b._id}','cancelled')">Cancel</button>` : ''}
      </td>
    </tr>`).join('');
}

async function updateBooking(id, status) {
  try {
    const res = await authFetch(`${API}/bookings/${id}`, {
      method: 'PATCH', body: JSON.stringify({ status })
    });
    if (!res.ok) { const d = await res.json(); toast(d.message || 'Error', true); return; }
    toast(`Booking ${status}.`);
    await loadBookings();
    updateStats();
  } catch { toast('Request failed.', true); }
}

// ── Inquiries ──
async function loadInquiries() {
  try {
    const res  = await authFetch(`${API}/inquiries`);
    const data = await res.json();
    allData.inquiries = data.inquiries || [];
    renderInquiries('');
    document.getElementById('badge-inquiries').textContent = allData.inquiries.filter(i => i.status === 'new').length;
  } catch { document.getElementById('inquiriesBody').innerHTML = '<tr><td colspan="6" class="empty">Failed to load.</td></tr>'; }
}

function renderInquiries(search = '') {
  const tbody = document.getElementById('inquiriesBody');
  let rows = allData.inquiries;
  if (search) rows = rows.filter(i => i.name.toLowerCase().includes(search) || i.email.toLowerCase().includes(search));
  if (!rows.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">No inquiries.</td></tr>'; return; }
  tbody.innerHTML = rows.map(i => `
    <tr>
      <td><strong>${esc(i.name)}</strong></td>
      <td style="font-family:var(--mono);font-size:.8rem">${esc(i.email)}</td>
      <td style="max-width:320px;font-size:.82rem;color:var(--muted)">${esc(i.message).slice(0, 120)}${i.message.length > 120 ? '…' : ''}</td>
      <td><span class="badge badge-${i.status}">${i.status}</span></td>
      <td style="font-family:var(--mono);font-size:.78rem">${new Date(i.createdAt).toLocaleDateString('en-GB')}</td>
      <td>
        ${i.status === 'new' ? `<button class="action-btn approve" onclick="updateInquiry('${i._id}','read')">Mark Read</button>` : ''}
        <button class="action-btn reject" onclick="deleteInquiry('${i._id}')">Delete</button>
      </td>
    </tr>`).join('');
}

async function updateInquiry(id, status) {
  try {
    await authFetch(`${API}/inquiries/${id}`, { method: 'PATCH', body: JSON.stringify({ status }) });
    toast('Inquiry updated.');
    await loadInquiries();
    updateStats();
  } catch { toast('Request failed.', true); }
}

async function deleteInquiry(id) {
  if (!confirm('Delete this inquiry?')) return;
  try {
    await authFetch(`${API}/inquiries/${id}`, { method: 'DELETE' });
    toast('Inquiry deleted.');
    await loadInquiries();
    updateStats();
  } catch { toast('Request failed.', true); }
}

// ── Reviews ──
async function loadReviews() {
  try {
    const res  = await authFetch(`${API}/reviews`);
    const data = await res.json();
    allData.reviews = data.reviews || [];
    renderReviews('');
    document.getElementById('badge-reviews').textContent = allData.reviews.filter(r => r.status !== 'published').length;
  } catch { document.getElementById('reviewsBody').innerHTML = '<tr><td colspan="7" class="empty">Failed to load.</td></tr>'; }
}

function renderReviews(search = '') {
  const tbody = document.getElementById('reviewsBody');
  let rows = allData.reviews;
  if (search) rows = rows.filter(r => r.name.toLowerCase().includes(search));
  if (!rows.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">No reviews.</td></tr>'; return; }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td><strong>${esc(r.name)}</strong></td>
      <td style="font-size:.82rem;color:var(--muted)">${esc(r.role || '—')}</td>
      <td style="max-width:280px;font-size:.82rem;color:var(--muted)">${esc(r.text).slice(0, 100)}${r.text.length > 100 ? '…' : ''}</td>
      <td class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</td>
      <td><span class="badge badge-${r.status}">${r.status}</span></td>
      <td style="font-family:var(--mono);font-size:.78rem">${new Date(r.createdAt).toLocaleDateString('en-GB')}</td>
      <td>
        ${r.status !== 'published' ? `<button class="action-btn publish" onclick="updateReview('${r._id}','published')">Publish</button>` : ''}
        <button class="action-btn reject" onclick="deleteReview('${r._id}')">Delete</button>
      </td>
    </tr>`).join('');
}

async function updateReview(id, status) {
  try {
    await authFetch(`${API}/reviews/${id}`, { method: 'PATCH', body: JSON.stringify({ status }) });
    toast('Review updated.');
    await loadReviews();
    updateStats();
  } catch { toast('Request failed.', true); }
}

async function deleteReview(id) {
  if (!confirm('Delete this review?')) return;
  try {
    await authFetch(`${API}/reviews/${id}`, { method: 'DELETE' });
    toast('Review deleted.');
    await loadReviews();
    updateStats();
  } catch { toast('Request failed.', true); }
}

// ── Stats ──
function updateStats() {
  const b = allData.bookings;
  const confirmed = b.filter(x => x.status === 'confirmed').length;
  document.getElementById('s-bookings').textContent  = b.length;
  document.getElementById('s-confirmed').textContent = confirmed;
  document.getElementById('s-inquiries').textContent = allData.inquiries.length;
  document.getElementById('s-reviews').textContent   = allData.reviews.length;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
